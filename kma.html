<!DOCTYPE html>s
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የአዲሎ ቅ/በዓታ ማሪያም ህንፃ አሰሪ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Serif Ethiopic', 'Times New Roman', serif;
            background-color: #f7f4eb;
            color: #2b2b2b;
            line-height: 1.6;
        }

        .hero-section {
            background: linear-gradient(rgba(43, 5, 10, 0.88), rgba(92, 6, 18, 0.93)), url('IMG_20260705_091224_368.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .coupon-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.4);
            position: relative;
            text-align: center;
        }

        .card-top-accent {
            height: 14px;
            background: linear-gradient(90deg, #d4af37, #f3e5ab, #8c6212, #f3e5ab, #d4af37);
        }

        .header {
            padding: 30px 20px 15px 20px;
            position: relative;
        }

        .logo-img {
            max-width: 100px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .church-title {
            font-size: 1.2rem;
            color: #5c0612;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .diocese {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .scripture-box {
            background: #fffdf9;
            border-top: 1px dashed #d4af37;
            border-bottom: 1px dashed #d4af37;
            padding: 14px 10px;
            margin: 10px 0;
        }

        .scripture-text {
            color: #8c6212;
            font-size: 1rem;
            font-style: italic;
        }

        .scripture-ref {
            font-size: 0.8rem;
            color: #888888;
            font-weight: bold;
        }

        .main-content {
            padding: 20px 20px 10px 20px;
        }

        /* ምስሉ ሙሉ ለሙሉ እንዲታይ የተደረገበት ክፍል */
        .cross-img {
            width: 100%;       /* የኮንቴይነሩን ሙሉ ስፋት እንዲይዝ */
            max-width: 220px;  /* ምስሉ በጣም እንዳይሰፋ መቆጣጠሪያ */
            height: auto;      /* መጠኑ በራሱ እንዲስተካከል */
            display: block;
            margin: 0 auto 15px auto;
            object-fit: contain; /* ምስሉ ሙሉ ለሙሉ እንዲታይ ያደርጋል */
        }

        .purpose-title {
            font-size: 1.5rem;
            color: #5c0612;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .ticket-divider {
            position: relative;
            height: 20px;
            margin: 10px 0;
        }

        .ticket-divider::before, .ticket-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background: #3b040b; 
            border-radius: 50%;
        }
        .ticket-divider::before { left: -12px; }
        .ticket-divider::after { right: -12px; }

        .dashed-line {
            border-top: 2px dashed #d4af37;
            opacity: 0.4;
            position: absolute;
            left: 20px;
            right: 20px;
            top: 50%;
        }

        .bank-card {
            background: linear-gradient(145deg, #fffdfa, #fdf8eb);
            border: 1px solid #eadeb8;
            border-radius: 18px;
            padding: 20px;
            margin: 10px;
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.1);
        }

        .bank-name { font-size: 0.9rem; color: #666; font-weight: 700; margin-bottom: 6px; }
        .account-number { font-size: 1.5rem; font-weight: 700; color: #111; margin-bottom: 15px; }

        .copy-btn {
            background: linear-gradient(135deg, #5c0612, #40040c);
            color: #ffffff;
            padding: 12px 28px;
            border-radius: 50px;
            width: 100%;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .footer-info { padding: 20px; background-color: #faf7f0; }
        .contact-label { font-size: 0.9rem; font-weight: 700; margin-bottom: 15px; }
        .phone-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1rem;
            color: #5c0612;
            text-decoration: none;
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #111; color: #fff; padding: 12px 24px; border-radius: 50px;
            display: none; z-index: 1000;
        }
        .toast.show { display: block; }
    </style>
</head>  
<body>

<div class="hero-section">  
    <div class="container">  
        <div class="coupon-card">  
            <div class="card-top-accent"></div>  
              
            <div class="header">  
                <img src="IMG_20260705_091229_939.jpg" alt="አርማ" class="logo-img">  
                <div class="church-title">በኢትዮጵያ ኦርቶዶክስ ተዋሕዶ ቤተ ክርስቲያን</div>  
                <div class="diocese">በከምባታ ጠምባሮ ሀላባ ሀገረ ስብከት የአዲሎ ቅድስት ኪዳነ ምሕረት ቤተ ክርስቲያን</div>  
                  
                <div class="scripture-box">  
                    <span class="scripture-text">"በኃይልህ ሰላም፥ በጌጠኛ ቤትህም ልማት ይሁን።"</span>  
                    <span class="scripture-ref">መዝሙር 122፥7</span>  
                </div>  
            </div>  

            <div class="main-content">  
                <!-- ምስሉ ሙሉ ለሙሉ እንዲታይ ተስተካክሏል -->
                <img src="IMG_20260705_091227_100.jpg" alt="መስቀል" class="cross-img">  
                <h1 class="purpose-title">የአዲሎ ቅ/በዓታ ማሪያም ህንፃ አሰሪ</h1>  
            </div>  

            <div class="ticket-divider">  
                <div class="dashed-line"></div>  
            </div>  

            <div class="main-content" style="padding-top: 0;">  
                <div class="bank-card">  
                    <div class="bank-name">የኢትዮጵያ ንግድ ባንክ (CBE)</div>  
                    <div class="account-number" id="accountNo">1000081363343</div>  
                    <button class="copy-btn" onclick="copyAccount()">አካውንቱን ገልብጥ</button>  
                </div>  
            </div>  

            <div class="footer-info">  
                <div class="contact-label">ለበለጠ መረጃ በእነዚህ ስልኮች ይደውሉ፦</div>  
                <div class="phone-list">  
                    <a href="tel:0938987988" class="phone-item">0938987988</a>  
                    <a href="tel:0910340004" class="phone-item">0910340004</a>  
                    <a href="tel:0919839512" class="phone-item">0919839512</a>  
                </div>  
            </div>  
        </div>  
    </div>  
</div>  

<div class="toast" id="toast">የባንክ አካውንቱ ተገልብጧል!</div>  

<script>  
    function copyAccount() {  
        const accountNo = document.getElementById('accountNo').innerText;  
        navigator.clipboard.writeText(accountNo).then(() => {  
            const toast = document.getElementById('toast');  
            toast.classList.add('show');  
            setTimeout(() => toast.classList.remove('show'), 2000);  
        });  
    }  
</script>

</body>  
</html>
