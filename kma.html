<!DOCTYPE html>
<html lang="am" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adilo Kidane Mihret Building Fund Digital Card</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Tokenized Custom Properties Engine */
        :root {
            --font-primary: 'Noto Sans Ethiopic', 'Poppins', system-ui, sans-serif;
            --font-secondary: 'Poppins', system-ui, sans-serif;

            /* HSL Fluid System Colors */
            --hue: 199;
            --primary: hsl(var(--hue), 89%, 48%);
            --primary-hover: hsl(var(--hue), 89%, 38%);
            --surface: hsl(0, 0%, 100%);
            --background: linear-gradient(135deg, hsl(210, 40%, 98%) 0%, hsl(215, 25%, 92%) 100%);
            --text-main: hsl(222, 47%, 11%);
            --text-muted: hsl(215, 16%, 47%);
            --border: hsl(214, 32%, 91%);
            --card-border: rgba(255, 255, 255, 0.6);
            
            /* Traditional Palette Accents */
            --eth-green: #006643;
            --eth-yellow: #cc9900;
            --eth-red: #cc0000;

            /* Component Configurations */
            --shadow-elevation-low: 0 2px 8px -2px rgba(0, 0, 0, 0.05);
            --shadow-elevation-high: 0 20px 40px -15px rgba(15, 23, 42, 0.12), 0 15px 25px -20px rgba(15, 23, 42, 0.08);
            --radius-lg: 24px;
            --radius-md: 14px;
            --transition-smooth: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Dark Mode Override Ecosystem */
        @media (prefers-color-scheme: dark) {
            :root {
                --surface: hsl(222, 47%, 11%);
                --background: linear-gradient(135deg, hsl(222, 47%, 6%) 0%, hsl(223, 47%, 12%) 100%);
                --text-main: hsl(210, 40%, 98%);
                --text-muted: hsl(215, 20%, 65%);
                --border: hsl(217, 32%, 18%);
                --card-border: rgba(255, 255, 255, 0.05);
                --shadow-elevation-high: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
        }

        /* Reset & Base System defaults */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-primary);
            background: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Engineered UI Card Container */
        .premium-card {
            background: var(--surface);
            width: 100%;
            max-width: 440px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-elevation-high);
            overflow: hidden;
            border: 1px solid var(--card-border);
            transition: var(--transition-smooth);
            position: relative;
        }

        .premium-card:hover, .premium-card:focus-within {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 30px 60px -15px rgba(15, 23, 42, 0.2);
        }

        /* OPTION 1: Modern Centered Split Stack Header Style */
        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 28px 24px;
            background: linear-gradient(to bottom, rgba(14, 165, 233, 0.04), transparent);
            position: relative;
        }

        /* Custom bottom divider node decoration */
        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
        }

        .header-title-am {
            font-size: clamp(1.5rem, 4vw, 1.8rem);
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        
        .header-title-am span:nth-child(1) { color: var(--eth-green); }
        .header-title-am span:nth-child(2) { color: var(--eth-yellow); }
        .header-title-am span:nth-child(3) { color: var(--eth-red); }

        .header-title-en {
            font-family: var(--font-secondary);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 6px;
            text-indent: 6px; /* Offsets right-padding letter spacing alignment */
        }

        /* Aspect-Ratio Driven Hero Container */
        .image-viewport {
            width: 100%;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            position: relative;
            background-color: var(--border);
        }

        .image-viewport img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .premium-card:hover .image-viewport img {
            transform: scale(1.05);
        }

        /* Floating Badge Component */
        .badge-anchor {
            padding: 0 28px;
            margin-top: -22px;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
        }

        .pill-badge {
            background: var(--primary);
            color: hsl(0, 0%, 100%);
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
            text-align: center;
            border: 3px solid var(--surface);
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        /* Content Module Structuring */
        .card-body {
            padding: 28px;
        }

        .interactive-container {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
            background: linear-gradient(to bottom right, var(--surface), rgba(0, 0, 0, 0.005));
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .description-paragraph {
            color: var(--text-main);
            font-size: 0.98rem;
            line-height: 1.75;
            text-align: justify;
            font-weight: 400;
            opacity: 0.9;
        }

        /* Interactive Action Elements */
        .actionable-field {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: var(--font-secondary);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            padding: 14px;
            background: var(--surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            text-decoration: none;
            transition: var(--transition-smooth);
            width: 100%;
            box-shadow: var(--shadow-elevation-low);
        }

        .actionable-field:focus {
            outline: 3px solid var(--primary);
            outline-offset: 2px;
        }

        .phone-link:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(14, 165, 233, 0.03);
        }

        .interactive-account {
            cursor: pointer;
            position: relative;
            user-select: none;
        }

        .interactive-account:hover {
            border-color: var(--primary);
            background: rgba(14, 165, 233, 0.03);
        }

        /* Smart Micro-copy Interactive Pseudo-Labeling */
        .interactive-account::after {
            content: '👁️ Click to view / copy';
            position: absolute;
            bottom: -20px;
            font-size: 0.68rem;
            color: var(--text-muted);
            font-family: var(--font-secondary);
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: var(--transition-smooth);
        }

        .interactive-account.revealed::after {
            content: '📋 Tap to Copy Details';
            color: var(--primary);
        }

        .interactive-account.copied::after {
            content: '✅ Copied to Clipboard!';
            color: #10b981;
        }

        /* Footer Attribution */
        .card-footer {
            padding: 0 28px 28px 28px;
            text-align: center;
        }

        .attribution {
            font-family: var(--font-secondary);
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .attribution strong {
            color: var(--text-main);
            font-weight: 600;
        }

        /* Optimized Clean Print Setup styling */
        @media print {
            body { background: none; color: #000; padding: 0; }
            .premium-card { box-shadow: none; border: 1px solid #000; transform: none !important; }
            .interactive-account::after { display: none; }
        }
    </style>
</head>
<body>

    <article class="premium-card" aria-label="Adilo Kidane Mihret Donation Voucher">
        <header class="card-header">
            <h1 class="header-title-am">
                <span>ኪዳነ</span> <span>ምሕ</span><span>ረት</span>
            </h1>
            <div class="header-title-en">Adilo</div>
        </header>

        <div class="image-viewport">
            <img src="km.jpg" alt="Conceptual architectural rendering layout of Adilo Kidane Mihret Church Building">
        </div>

        <div class="badge-anchor">
            <span class="pill-badge">ለህንፃ ግንባታ የተዘጋጀ ኮፖን</span>
        </div>

        <div class="card-body">
            <div class="interactive-container">
                <p class="description-paragraph">
                    በኢትዮጵያ ኦርቶዶክስ ተዋሕዶ ቤተ ክርስቲያን በከምባታ ጠምባሮ ሀገረ ስብከት የአዲሎ ቅድስት ኪዳነ ምሕረት ቤተ ክርስቲያን ለህንፃ ግንባታ የተዘጋጀ ኮፖን።
                </p>
                
                <a href="tel:0926327137" class="actionable-field phone-link" title="Call primary organizational point of contact">
                    <span>📱</span> 0926327137
                </a>

                <button class="actionable-field interactive-account" id="secureAccountWidget" title="Click to reveal and copy Bank Account Details" aria-live="polite">
                    <span>💳</span> <span id="visibleAccountNumber">100055*****89</span>
                </button>
            </div>
        </div>

        <footer class="card-footer">
            <p class="attribution">designed by <strong>Jembo printing center Adilo</strong></p>
        </footer>
    </article>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const accountWidget = document.getElementById('secureAccountWidget');
            const targetDisplay = document.getElementById('visibleAccountNumber');
            
            // Hardcoded real secure account payload data string 
            const dynamicSecurePayload = '1000554321089';
            let fullyRevealed = false;

            accountWidget.addEventListener('click', async () => {
                if (!fullyRevealed) {
                    // Stage 1: Reveal string visually
                    targetDisplay.textContent = dynamicSecurePayload;
                    accountWidget.classList.add('revealed');
                    fullyRevealed = true;
                } else {
                    // Stage 2: Clipboard Write Interaction Loop
                    try {
                        await navigator.clipboard.writeText(dynamicSecurePayload);
                        accountWidget.classList.remove('revealed');
                        accountWidget.classList.add('copied');
                        
                        // Resets dynamic state properties cleanly after momentary confirmation delay
                        setTimeout(() => {
                            accountWidget.classList.remove('copied');
                            accountWidget.classList.add('revealed');
                        }, 2000);
                    } catch (err) {
                        console.error('Failed operational data clipboard sequence copy: ', err);
                    }
                }
            });
        });
    </script>
</body>
</html>
